  <text x="34" y="228" class="barlabel">Cloud &amp; AWS</text>
  <rect class="barbg" x="34" y="238" width="310" height="10" rx="5"/>
  <rect fill="#58a6ff" x="34" y="238" height="10" rx="5" width="0">
    <animate attributeName="width" values="0;285" begin="0.4s" dur="1.2s" fill="freeze"/>
  </rect>
  <text x="349" y="247" class="barlabel">92%</text>

  <text x="34" y="272" class="barlabel">Generative AI</text>
  <rect class="barbg" x="34" y="282" width="310" height="10" rx="5"/>
  <rect fill="#bd93f9" x="34" y="282" height="10" rx="5" width="0">
    <animate attributeName="width" values="0;260" begin="1.5s" dur="1.2s" fill="freeze"/>
  </rect>
  <text x="349" y="291" class="barlabel">84%</text>

  <text x="34" y="316" class="barlabel">VR / 3D Design</text>
  <rect class="barbg" x="34" y="326" width="310" height="10" rx="5"/>
  <rect fill="#ffd94a" x="34" y="326" height="10" rx="5" width="0">
    <animate attributeName="width" values="0;230" begin="2.6s" dur="1.2s" fill="freeze"/>
  </rect>
  <text x="349" y="335" class="barlabel">74%</text>

  <line x1="34" y1="358" x2="350" y2="358" stroke="#21262d" stroke-width="1"/>

  <text x="34" y="386" class="heading">// echo $STATUS</text>
  <text x="34" y="412" class="value" opacity="0">"Open for Internships and Work Opportunities"
    <animate attributeName="opacity" values="0;1" begin="4.0s" dur="0.5s" fill="freeze"/>
  </text>

  <rect class="cursor" x="34" y="426" width="8" height="14" opacity="0">
    <animate attributeName="opacity" values="0;1;1;0;0" keyTimes="0;0.01;0.5;0.51;1" begin="4.3s" dur="1s" repeatCount="indefinite"/>
  </rect>

  <!-- divider -->
  <line x1="370" y1="66" x2="370" y2="540" stroke="#21262d" stroke-width="1"/>

  <!-- info block -->
