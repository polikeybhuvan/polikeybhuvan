  <rect class="cursor" x="542" y="76" width="7" height="13">
    <animate attributeName="opacity" values="1;1;0;0" keyTimes="0;0.5;0.51;1" dur="1s" repeatCount="indefinite" />
  </rect>

  <text x="390" y="120" class="label">Subject   </text><text x="536" y="120" class="value">Polikey Bhuvan</text>
  <text x="390" y="144" class="label">Role      </text><text x="536" y="144" class="value">AWS Cloud &amp; AI Engineer</text>
  <text x="390" y="168" class="label">Origin    </text><text x="536" y="168" class="value">Jamshedpur, Jharkhand, India</text>
  <text x="390" y="192" class="label">Education </text><text x="536" y="192" class="value">B.Tech CSE, Centurion University</text>
  <text x="390" y="216" class="label">Status    </text><text x="536" y="216" class="value">Open to Internships / Entry-level</text>
  <text x="390" y="240" class="label">ToolChain </text><text x="536" y="240" class="value">AWS, Gemini API, Unity, UE5</text>

