  <text x="390" y="318" class="label">Lang      </text><text x="536" y="318" class="value">Python, C#, Java, C/C++</text>
  <text x="390" y="342" class="label">Cloud     </text><text x="536" y="342" class="value">Lambda, S3, DynamoDB, SNS/SQS</text>
  <text x="390" y="366" class="label">AI/ML     </text><text x="536" y="366" class="value">Generative AI, LLMs, Prompt Eng.</text>
  <text x="390" y="390" class="label">VR/3D     </text><text x="536" y="390" class="value">Unity, Unreal Engine 5, Blender</text>

  <line x1="390" y1="412" x2="910" y2="412" stroke="#21262d" stroke-width="1"/>

  <text x="390" y="442" class="heading">contact.grid</text>
  <text x="390" y="468" class="label">Mail      </text><text x="536" y="468" class="value">polikeybhuvan@gmail.com</text>
  <text x="390" y="492" class="label">Portfolio </text><text x="536" y="492" class="value">polikey-bhuvan.onrender.com</text>
  <text x="390" y="516" class="label">LinkedIn  </text><text x="536" y="516" class="value">linkedin.com/in/polikeybhuvan</text>
  <text x="390" y="540" class="label">GitHub    </text><text x="536" y="540" class="value">github.com/polikeybhuvan</text>
