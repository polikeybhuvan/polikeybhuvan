<svg width="940" height="560" viewBox="0 0 940 560" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .bg { fill: #0d1117; }
      .border { fill: none; stroke: #7ee7fc; stroke-width: 1.5; }
      .label { font-family: 'Courier New', monospace; font-size: 14px; fill: #bd93f9; }
      .value { font-family: 'Courier New', monospace; font-size: 14px; fill: #e6f1ff; }
      .heading { font-family: 'Courier New', monospace; font-size: 14px; fill: #58e6c1; font-weight: bold; }
      .path { font-family: 'Courier New', monospace; font-size: 13px; fill: #6b7280; }
      .prompt { font-family: 'Courier New', monospace; font-size: 13px; fill: #ff79c6; }
      .cursor { fill: #ff79c6; }
      .boot { font-family: 'Courier New', monospace; font-size: 13px; fill: #58e6c1; }
      .bootok { font-family: 'Courier New', monospace; font-size: 13px; fill: #3fb950; font-weight: bold; }
      .barlabel { font-family: 'Courier New', monospace; font-size: 13px; fill: #e6f1ff; }
      .barbg { fill: #21262d; }
    </style>
  </defs>

  <rect class="bg" width="940" height="560" rx="10"/>
  <rect class="border" x="10" y="10" width="920" height="540" rx="8"/>

  <circle cx="34" cy="34" r="6" fill="#ff5f56"/>
  <circle cx="54" cy="34" r="6" fill="#ffbd2e"/>
  <circle cx="74" cy="34" r="6" fill="#27c93f"/>
  <text x="470.0" y="39" text-anchor="middle" class="path">polikeybhuvan / README.md</text>

  <line x1="10" y1="56" x2="930" y2="56" stroke="#21262d" stroke-width="1"/>

  <!-- BOOT SEQUENCE -->
  <text x="34" y="90" class="prompt">// init --engineer polikeybhuvan</text>

  <g>
    <text x="34" y="122" class="boot" opacity="0">
      Loading cloud_infra module...
      <animate attributeName="opacity" values="0;1" begin="0.2s" dur="0.3s" fill="freeze"/>
    </text>
    <text x="290" y="122" class="bootok" opacity="0">[ OK ]
      <animate attributeName="opacity" values="0;1" begin="1.0s" dur="0.3s" fill="freeze"/>
    </text>
  </g>

  <g>
    <text x="34" y="150" class="boot" opacity="0">
      Loading generative_ai module...
      <animate attributeName="opacity" values="0;1" begin="1.3s" dur="0.3s" fill="freeze"/>
    </text>
    <text x="290" y="150" class="bootok" opacity="0">[ OK ]
      <animate attributeName="opacity" values="0;1" begin="2.1s" dur="0.3s" fill="freeze"/>
    </text>
  </g>

  <g>
    <text x="34" y="178" class="boot" opacity="0">
      Loading vr_render_engine module...
      <animate attributeName="opacity" values="0;1" begin="2.4s" dur="0.3s" fill="freeze"/>
    </text>
    <text x="290" y="178" class="bootok" opacity="0">[ OK ]
      <animate attributeName="opacity" values="0;1" begin="3.2s" dur="0.3s" fill="freeze"/>
    </text>
  </g>

  <line x1="34" y1="200" x2="350" y2="200" stroke="#21262d" stroke-width="1"/>

